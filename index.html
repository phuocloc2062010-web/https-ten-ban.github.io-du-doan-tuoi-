<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rauma</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1a1a1a,#3b0764);
}

.card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.logo{
    font-size:32px;
    font-weight:bold;
    background:linear-gradient(90deg,#ffcc00,#ff6600,#ff0066);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
}

.title{
    font-size:28px;
    font-weight:bold;
    color:#6a11cb;
    margin-bottom:20px;
}

.question{
    font-size:18px;
    margin-bottom:15px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #6a11cb;
    border-radius:10px;
    font-size:18px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#6a11cb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#4e0db0;
}

.loading{
    display:none;
    margin-top:20px;
}

.bar{
    width:100%;
    height:15px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:limegreen;
}

.result{
    margin-top:20px;
    text-align:left;
    line-height:1.8;
    font-size:17px;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">🔥 LỘC BÉO 🔥</div>

    <div class="title">RAUMA</div>

    <div class="question">
        🎮 Bạn muốn chơi Free Fire không?<br><br>
        👉 Có thì nhập <b>1</b><br>
        👉 Không thì nhập <b>2</b>
    </div>

    <input type="number" id="luaChon" placeholder="Nhập 1 hoặc 2">

    <button onclick="xuLy()">XÁC NHẬN</button>

    <div class="loading" id="loading">
        <p>⏳ Đang xử lý...</p>
        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>
    </div>

    <div class="result" id="ketQua"></div>

</div>

<script>

function xuLy(){

    let lc = document.getElementById("luaChon").value;

    document.getElementById("ketQua").innerHTML = "";
    document.getElementById("loading").style.display = "block";

    let fill = document.getElementById("fill");
    fill.style.width = "0%";

    let p = 0;

    let load = setInterval(function(){

        p++;
        fill.style.width = p + "%";

        if(p >= 100){

            clearInterval(load);

            document.getElementById("loading").style.display = "none";

            if(lc == "1"){

                document.getElementById("ketQua").innerHTML = `
                <div class="success">
                🎮 HƯỚNG DẪN CHƠI FREE FIRE
                </div>
                <br>
                📌 Bước 1: Thoát app đang sử dụng.<br>
                📌 Bước 2: Tìm ứng dụng Free Fire.<br>
                📌 Bước 3: Vào và trải nghiệm.<br><br>

                😎 Bạn có thể rủ Lộc đẹp trai chơi cùng để gánh bạn.
                `;
            }

            else if(lc == "2"){

                window.open(
                "https://youtu.be/UQ32RS8JYck?si=iDCp4jl4GOEZDxuA",
                "_blank"
                );

                document.getElementById("ketQua").innerHTML = `
                ✅ Đang mở video YouTube...
                `;
            }

            else{

                document.getElementById("ketQua").innerHTML = `
                <div class="error">
                ❌ Vui lòng nhập 1 hoặc 2.
                </div>
                `;
            }
        }

    },15);

}
</script>

</body>
</html>
