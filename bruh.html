<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máy Dự Đoán Vợ Tương Lai Của Bạn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d6d,#6a11cb);
}

.card{
    width:450px;
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.logo{
    font-size:30px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff9900,#ff0066,#0066ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
}

.title{
    font-size:24px;
    color:#6a11cb;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #6a11cb;
    border-radius:10px;
    font-size:17px;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#6a11cb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#4c0ca3;
}

.loading{
    display:none;
    margin-top:20px;
}

.bar{
    width:100%;
    height:15px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:limegreen;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#ff0066;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">🔥 PHƯỚC LỘC ĐẸP ZAI 🔥</div>

    <div class="title">
        💘 Máy Dự Đoán Vợ Tương Lai Của Bạn 💘
    </div>

    <input type="text" id="name" placeholder="Nhập họ và tên">

    <button onclick="duDoan()">
        XEM KẾT QUẢ
    </button>

    <div class="loading" id="loading">
        <p>🔍 Đang tìm kiếm vợ tương lai...</p>
        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>
    </div>

    <div class="result" id="result"></div>

</div>

<script>

function chuanHoaTen(str){
    return str
    .trim()
    .toLowerCase()
    .replace(/\s+/g,' ');
}

function duDoan(){

    let ten = document.getElementById("name").value;
    let t = chuanHoaTen(ten);

    document.getElementById("result").innerHTML = "";
    document.getElementById("loading").style.display = "block";

    let fill = document.getElementById("fill");
    fill.style.width = "0%";

    let p = 0;

    let load = setInterval(function(){

        p++;
        fill.style.width = p + "%";

        if(p >= 100){

            clearInterval(load);

            document.getElementById("loading").style.display = "none";

            let ketqua = "";

            if(t === "bảo duy"){
                ketqua = "💖 Vợ bạn là: Phan Lê Hồng Phúc";
            }
            else if(t === "huỳnh anh kiệt"){
                ketqua = "💖 Vợ bạn là: Cẩm Hường";
            }
            else if(t === "nguyễn thiện phước"){
                ketqua = "💖 Vợ bạn là: Bảo Ngọc";
            }
            else{
                ketqua = "❓ Hệ thống chưa tìm thấy dữ liệu.";
            }

            document.getElementById("result").innerHTML = ketqua;
        }

    },20);

}

</script>

</body>
</html>
